name: build-x86-64-istoreos-24.10.x

on:
  workflow_dispatch:
    inputs:
      istoreos_version:
        description: "选择 iStoreOS 版本"
        required: false
        default: "24.10.5"
        type: choice
        options:
          - 24.10.5
          - 24.10.4
          - 24.10.3
      custom_router_ip:
        description: "请设置路由器的管理地址(格式:192.168.x.1)"
        required: true
        default: "192.168.100.1" # iStoreOS 推荐的默认网关
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '1024'
      enable_store:
        description: "集成 iStore 商店及特色 UI (iStoreOS 必备)"
        required: false
        type: boolean
        default: true
      include_docker:
        description: |
          是否编译 Docker 插件
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置 PPPoE 拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
        - 'yes'
        - 'no'
      pppoe_account:
        description: "宽带账号 (若启用 PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用 PPPoE)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build24.sh

      - name: Save Custom Router IP into OpenWrt files
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ github.event.inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"
          echo "您设置的路由器管理地址是:${{ github.event.inputs.custom_router_ip }}"
      
      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]]; then
              echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
              exit 1
            fi
          fi
      
      - name: Enable iStoreOS Features integration
        run: |
          mkdir -p shell
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            # 完整注入 iStoreOS 的核心商店、主题与向导界面
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store luci-theme-istoreos luci-app-quickstart"' >> shell/custom-packages.sh
            echo "✅ 已追加 iStoreOS 24.10.x 核心UI和商店组件"
          else
            echo "❎ 未启用 iStoreOS 特色组件"
          fi

      - name: Build iStoreOS-x86-64-efi 24.10.x
        run: |
          profile="${{ github.event.inputs.profile }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          istoreos_version="${{ github.event.inputs.istoreos_version }}"
          echo "Building for profile: $profile with iStoreOS version: $istoreos_version"
          
          # 使用 linkease 官方的 24.10.x ImageBuilder 镜像
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/openwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/openwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/openwrt/files/etc/config" \
            -v "${{ github.workspace }}/x86-64/imm.config:/home/build/openwrt/.config" \
            -v "${{ github.workspace }}/shell:/home/build/openwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build24.sh:/home/build/openwrt/build.sh" \
            -e PROFILE=$profile \
            -e INCLUDE_DOCKER=$include_docker \
            -e ENABLE_PPPOE=${{ inputs.enable_pppoe }} \
            -e PPPOE_ACCOUNT=${{ inputs.pppoe_account }} \
            -e PPPOE_PASSWORD=${{ inputs.pppoe_password }} \
            linkease/istoreos-imagebuilder:x86-64-${istoreos_version} /bin/bash /home/build/openwrt/build.sh

      - name: Create info
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 📡 iStoreOS 路由器后台信息
          <a href="https://wkdaily.cpolar.cn/archives/1">
           <img src="https://img.shields.io/badge/若下载慢可套用国内加速站下载-FC7C0D?logo=github&logoColor=fff&labelColor=000&style=for-the-badge"/>
          </a>
          
          - 🏠 **后台地址**: ${{ github.event.inputs.custom_router_ip }}
          - 👤 **用户名**: root
          - 🔑 **密码**: password (iStoreOS默认密码)
          - 📦 **系统基底**: iStoreOS ${{ github.event.inputs.istoreos_version }}
          EOF

          if [ "${{ github.event.inputs.include_docker }}" == "yes" ]; then
            extra_content="#### 默认带docker"
            echo -e "\n$extra_content" >> ${{ github.workspace }}/router-info.md
          else
            echo -e "\n#### 不带docker" >> ${{ github.workspace }}/router-info.md
          fi

      - name: Upload iStoreOS as release assets
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: Autobuild-iStoreOS-x86-64
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
